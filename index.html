<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Rise & Root — Smart Money Concepts signal intelligence for gold, indices and FX. Scripts read market structure (BOS, CHoCH, OTE) around the clock and flag high-conviction setups. Decision-support, not a fund. You hold the trigger." />
    <title>Rise & Root — Trade on Signal</title>
    <script>
      // Resolve the theme before first paint to avoid a flash: stored choice →
      // OS preference → dark default. Mirrors src/context/ThemeContext.jsx.
      (function () {
        try {
          var stored = localStorage.getItem('rr.theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
